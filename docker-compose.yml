version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: shipment_service
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mongo_data:/data/db

  shipment-service:
    build: .
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: ${GRPC_PORT:-50051}
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongo:27017}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
