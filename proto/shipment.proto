syntax = "proto3";

package shipment.v1;

option go_package = "github.com/ZhangeldyB/ShipmentTestTask/gen/shipment/v1";

service ShipmentService {
  rpc CreateShipment(CreateShipmentRequest) returns (ShipmentResponse);
  rpc GetShipment(GetShipmentRequest) returns (ShipmentResponse);
  rpc AddStatusEvent(AddStatusEventRequest) returns (ShipmentResponse);
  rpc GetShipmentEvents(GetShipmentEventsRequest) returns (GetShipmentEventsResponse);
}

message CreateShipmentRequest {
  string origin = 1;
  string destination = 2;
  double amount = 3;
  double driver_revenue = 4;
  string driver_name = 5;
  string driver_phone = 6;
  string unit_number = 7;
}

message GetShipmentRequest {
  string shipment_id = 1;
}

message AddStatusEventRequest {
  string shipment_id = 1;
  string new_status = 2;
  string note = 3;
}

message GetShipmentEventsRequest {
  string shipment_id = 1;
}

message ShipmentResponse {
  string id = 1;
  string reference_number = 2;
  string origin = 3;
  string destination = 4;
  string status = 5;
  string driver_name = 6;
  string driver_phone = 7;
  string unit_number = 8;
  double amount = 9;
  double driver_revenue = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ShipmentEvent {
  string id = 1;
  string shipment_id = 2;
  string status = 3;
  string note = 4;
  string occurred_at = 5;
}

message GetShipmentEventsResponse {
  repeated ShipmentEvent events = 1;
}
